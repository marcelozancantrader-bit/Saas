name: E2E Smoke

on:
  # Trigger manual via Actions UI — não roda em todo push pra não atrasar CI.
  # Pra rodar contra prod regularmente, agendar via cron daqui.
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL contra a qual rodar (default https://memorial-ai-mu.vercel.app)"
        required: false
        default: "https://memorial-ai-mu.vercel.app"
  # Rodar 1x/dia contra prod como heartbeat — detecta deploy quebrado.
  schedule:
    - cron: "0 9 * * *"

jobs:
  smoke:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://memorial-ai-mu.vercel.app' }}
          CI: "true"
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
